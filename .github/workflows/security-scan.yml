name: security-scan

on:
  workflow_call:
    inputs:
      workflow_revision:
        description: Exact .github commit SHA used by this reusable workflow call.
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trivy:
    name: trivy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Resolve Trivy config
        id: trivyconfig
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f trivy.yaml ]]; then
            echo "path=trivy.yaml" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cat > .trivy-default.yaml <<'TRIVYEOF'
          severity:
            - HIGH
            - CRITICAL
          vulnerability:
            ignore-unfixed: true
          scan:
            scanners:
              - vuln
              - misconfig
              - secret
              - license
          TRIVYEOF
          sed -i 's/^          //' .trivy-default.yaml
          echo "path=.trivy-default.yaml" >> "$GITHUB_OUTPUT"

      - name: Resolve Trivy ignore file
        id: trivyignore
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .trivyignore.yaml ]]; then
            echo "path=.trivyignore.yaml" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          : > .trivyignore.empty.yaml
          echo "path=.trivyignore.empty.yaml" >> "$GITHUB_OUTPUT"

      - name: Trivy repository scan
        id: trivy_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: ${{ steps.trivyconfig.outputs.path }}
          trivyignores: ${{ steps.trivyignore.outputs.path }}
          scanners: vuln,misconfig,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: trivy-results.json
          exit-code: "1"

      - name: Checkout scan contract at reusable workflow revision
        if: always()
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          repository: FutureDevGuys/.github
          ref: ${{ inputs.workflow_revision }}
          path: .security-contract
          sparse-checkout: .github/scripts
          fetch-depth: 1

      - name: Verify scan contract revision
        if: always()
        shell: bash
        env:
          EXPECTED_REVISION: ${{ inputs.workflow_revision }}
        run: |
          set -euo pipefail
          actual_revision="$(git -C .security-contract rev-parse HEAD)"
          if [[ ! "$EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "workflow_revision is not an exact commit SHA: $EXPECTED_REVISION" >&2
            exit 1
          fi
          if [[ "$actual_revision" != "$EXPECTED_REVISION" ]]; then
            echo "scan contract revision mismatch: expected=$EXPECTED_REVISION actual=$actual_revision" >&2
            exit 1
          fi

      - name: Build scan execution receipt
        if: always()
        shell: bash
        env:
          SCAN_OUTCOME: ${{ steps.trivy_scan.outcome }}
          TRIVY_CONFIG: ${{ steps.trivyconfig.outputs.path }}
          TRIVY_IGNORE: ${{ steps.trivyignore.outputs.path }}
        run: |
          set -euo pipefail
          tool_version="$(trivy --version 2>/dev/null | head -n 1 || true)"
          python3 .security-contract/.github/scripts/build_scan_result.py \
            --output scan-result.json \
            --report trivy-results.json \
            --scan-outcome "${SCAN_OUTCOME:-skipped}" \
            --tool-version "$tool_version" \
            --repository "${{ github.repository }}" \
            --ref "${{ github.ref }}" \
            --commit "${{ github.sha }}" \
            --event "${{ github.event_name }}" \
            --workflow-revision "${{ inputs.workflow_revision }}" \
            --config "${TRIVY_CONFIG:-.trivy-default.yaml}" \
            --ignore-file "${TRIVY_IGNORE:-.trivyignore.empty.yaml}"

      - name: Upload scan result evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scan-result
          path: |
            scan-result.json
            trivy-results.json
          if-no-files-found: error
          retention-days: 14

      - name: Add scan summary
        if: always()
        shell: bash
        run: |
          echo "## Trivy execution receipt" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f scan-result.json ]]; then
            jq -r '
              "- Executed: \(.executed)",
              "- Tool: \(.tool.name) \(.tool.version)",
              "- Result: \(.result.status)",
              "- HIGH: \(.result.high)",
              "- CRITICAL: \(.result.critical)",
              (.report.sha256 // "missing") as $report_sha |
              "- Report SHA-256: \($report_sha)"
            ' scan-result.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Receipt missing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce truthful Trivy gate
        if: always()
        run: >-
          python3 .security-contract/.github/scripts/validate_scan_result.py
          scan-result.json trivy-results.json
          --repository "${{ github.repository }}"
          --ref "${{ github.ref }}"
          --commit "${{ github.sha }}"
          --event "${{ github.event_name }}"
          --workflow-revision "${{ inputs.workflow_revision }}"
