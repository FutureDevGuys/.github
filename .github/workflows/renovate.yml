name: Renovate

concurrency:
  group: renovate-${{ github.repository }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      repoCache:
        description: "Repository cache mode"
        type: choice
        default: enabled
        options:
          - enabled
          - disabled
          - reset
      logLevel:
        description: "Renovate log level"
        type: choice
        default: info
        options:
          - info
          - debug
      validateCreds:
        description: "Validate credentials before running Renovate"
        type: boolean
        default: true
      repositories:
        description: "Comma-separated owner/repo list. Overrides autodiscovery when set."
        required: false
        type: string
        default: ""
      autodiscoverFilter:
        description: "Autodiscovery filter used when repositories is empty"
        required: false
        type: string
        default: "FutureDevGuys/*"
      dryRun:
        description: "Renovate dry-run mode"
        type: choice
        default: "off"
        options:
          - "off"
          - lookup
          - full
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  actions: write

env:
  cache_archive: renovate_repo_cache.tar.gz
  cache_dir: /tmp/renovate/cache/renovate/repository
  cache_key: renovate-repo-cache
  renovate_org: FutureDevGuys

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      RENOVATE_AUTODISCOVER: ${{ (github.event_name != 'workflow_dispatch' || inputs.repositories == '') && 'true' || 'false' }}
      RENOVATE_AUTODISCOVER_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.autodiscoverFilter || 'FutureDevGuys/*' }}
      RENOVATE_REPOSITORIES: ${{ github.event_name == 'workflow_dispatch' && inputs.repositories || '' }}
      RENOVATE_CONFIG_PRESET: github>FutureDevGuys/.github:renovate-config#${{ github.sha }}
      RENOVATE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dryRun != 'off' && inputs.dryRun || '' }}

    steps:
      - name: Checkout (optional for Renovate)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Preflight - Validate token and exact shared preset
        shell: bash
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${RENOVATE_TOKEN:-}" ]; then
            echo "ERROR: secrets.RENOVATE_TOKEN is missing/empty."
            exit 1
          fi

          user_code="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${RENOVATE_TOKEN}" \
            https://api.github.com/user)"

          if [ "${user_code}" != "200" ]; then
            echo "ERROR: RENOVATE_TOKEN failed /user check (HTTP ${user_code})."
            exit 1
          fi

          command -v gh >/dev/null 2>&1 || { echo "ERROR: gh is required for repo autodiscovery preflight."; exit 1; }
          command -v jq >/dev/null 2>&1 || { echo "ERROR: jq is required for repo autodiscovery preflight."; exit 1; }

          if [[ ! "${RENOVATE_CONFIG_PRESET}" =~ ^github\>FutureDevGuys/\.github:renovate-config\#[0-9a-f]{40}$ ]]; then
            echo "ERROR: RENOVATE_CONFIG_PRESET must use the exact org preset at a 40-character commit SHA." >&2
            exit 1
          fi
          preset_revision="${RENOVATE_CONFIG_PRESET##*#}"
          GH_TOKEN="${RENOVATE_TOKEN}" gh api \
            "repos/FutureDevGuys/.github/contents/renovate-config.json?ref=${preset_revision}" \
            --jq '.sha' >/dev/null
          echo "OK: authenticated read of exact shared preset revision ${preset_revision}."

          if [ -n "${RENOVATE_REPOSITORIES:-}" ]; then
            echo "Explicit repository mode:"
            tr ',' '\n' <<< "${RENOVATE_REPOSITORIES}" | while IFS= read -r repo; do
              repo="$(xargs <<< "${repo}")"
              [ -n "${repo}" ] || continue
              GH_TOKEN="${RENOVATE_TOKEN}" gh repo view "${repo}" --json nameWithOwner --jq '.nameWithOwner' >/dev/null
              echo "  ${repo}"
            done
          else
            org="${RENOVATE_AUTODISCOVER_ORG:-${{ env.renovate_org }}}"
            repos="$(
              GH_TOKEN="${RENOVATE_TOKEN}" gh api "orgs/${org}/repos?per_page=100&type=all" --paginate \
                --jq '.[] | select(.archived == false) | .full_name'
            )"

            if [ -z "${repos}" ]; then
              echo "ERROR: No accessible repositories discovered in org ${org}."
              exit 1
            fi
            echo "OK: RENOVATE_TOKEN can enumerate org repos for autodiscovery."
          fi

      - name: Preflight - Validate Docker Hub login (optional)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.validateCreds == 'true' }}
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME:-}" ] && [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Docker Hub secrets not set; skipping Docker Hub auth check."
            exit 0
          fi
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "ERROR: Docker Hub auth is partially configured. Provide BOTH DOCKERHUB_USERNAME and DOCKERHUB_TOKEN."
            exit 1
          fi

          printf '%s' "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Preflight - Validate GHCR login (optional)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.validateCreds == 'true' }}
        shell: bash
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GHCR_USERNAME:-}" ] && [ -z "${GHCR_TOKEN:-}" ]; then
            echo "GHCR secrets not set; skipping GHCR auth check."
            exit 0
          fi

          if [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
            echo "ERROR: GHCR auth is partially configured. Provide BOTH GHCR_USERNAME and GHCR_TOKEN."
            exit 1
          fi

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

      - name: Download previous Renovate repo cache artifact
        if: ${{ (github.event.inputs.repoCache || 'enabled') == 'enabled' }}
        continue-on-error: true
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          name: ${{ env.cache_key }}
          path: cache-download

      - name: Restore Renovate repo cache
        if: ${{ (github.event.inputs.repoCache || 'enabled') == 'enabled' }}
        shell: bash
        run: |
          set -euxo pipefail
          if [ ! -d cache-download ]; then
            echo "No cache found."
            exit 0
          fi
          mkdir -p "${cache_dir}"
          tar -xzf "cache-download/${cache_archive}" -C "${cache_dir}" || true
          sudo chown -R 12021:0 /tmp/renovate/ || true

      - name: Self-hosted Renovate (attempt 1 of 2)
        id: renovate_primary
        continue-on-error: true
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          configurationFile: .github/renovate-config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
          # renovate: datasource=docker depName=renovate/renovate
          renovate-version: 43.269.1@sha256:2d55099f3cd26c0e91fdf69b8a7d904adb7cf0f3039ad33b94b1856d3cf928b4
          env-regex: "^(?:RENOVATE_\\w+|DOCKERHUB_\\w+|GHCR_\\w+|LOG_LEVEL)$"
        env:
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
          RENOVATE_CACHE_DIR: /tmp/renovate/cache
          RENOVATE_REPOSITORY_CACHE: ${{ github.event.inputs.repoCache || 'enabled' }}
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_AUTODISCOVER: ${{ env.RENOVATE_AUTODISCOVER }}
          RENOVATE_AUTODISCOVER_FILTER: ${{ env.RENOVATE_AUTODISCOVER_FILTER }}
          RENOVATE_AUTODISCOVER_ORG: ${{ env.renovate_org }}
          RENOVATE_REPOSITORIES: ${{ env.RENOVATE_REPOSITORIES }}
          RENOVATE_CONFIG_PRESET: ${{ env.RENOVATE_CONFIG_PRESET }}
          RENOVATE_DRY_RUN: ${{ env.RENOVATE_DRY_RUN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Bounded retry delay
        if: steps.renovate_primary.outcome == 'failure'
        run: sleep 30

      - name: Self-hosted Renovate (attempt 2 of 2)
        if: steps.renovate_primary.outcome == 'failure'
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          configurationFile: .github/renovate-config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
          # renovate: datasource=docker depName=renovate/renovate
          renovate-version: 43.269.1@sha256:2d55099f3cd26c0e91fdf69b8a7d904adb7cf0f3039ad33b94b1856d3cf928b4
          env-regex: "^(?:RENOVATE_\\w+|DOCKERHUB_\\w+|GHCR_\\w+|LOG_LEVEL)$"
        env:
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
          RENOVATE_CACHE_DIR: /tmp/renovate/cache
          RENOVATE_REPOSITORY_CACHE: ${{ github.event.inputs.repoCache || 'enabled' }}
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_AUTODISCOVER: ${{ env.RENOVATE_AUTODISCOVER }}
          RENOVATE_AUTODISCOVER_FILTER: ${{ env.RENOVATE_AUTODISCOVER_FILTER }}
          RENOVATE_AUTODISCOVER_ORG: ${{ env.renovate_org }}
          RENOVATE_REPOSITORIES: ${{ env.RENOVATE_REPOSITORIES }}
          RENOVATE_CONFIG_PRESET: ${{ env.RENOVATE_CONFIG_PRESET }}
          RENOVATE_DRY_RUN: ${{ env.RENOVATE_DRY_RUN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Compress Renovate repo cache
        if: ${{ (github.event.inputs.repoCache || 'enabled') != 'disabled' }}
        shell: bash
        run: |
          set -euxo pipefail
          if [ -d "${cache_dir}" ]; then
            tar -czf "${cache_archive}" -C "${cache_dir}" .
          else
            echo "Repo cache dir not found; skipping."
            exit 0
          fi

      - name: Upload Renovate repo cache artifact
        if: ${{ (github.event.inputs.repoCache || 'enabled') != 'disabled' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.cache_key }}
          path: ${{ env.cache_archive }}
          retention-days: 7
