name: security-scan

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 0"

permissions:
  contents: read

jobs:
  trivy:
    uses: FutureDevGuys/.github/.github/workflows/security-scan.yml@1111111111111111111111111111111111111111
    with:
      workflow_revision: "1111111111111111111111111111111111111111"
    permissions:
      contents: read
