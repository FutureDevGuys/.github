name: security-scan

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 0"

permissions:
  contents: read

jobs:
  trivy:
    uses: FutureDevGuys/.github/.github/workflows/security-scan.yml@032d7dc24158b3c7fe52c393028b71d5c030ffdd
    with:
      workflow_revision: "7086ddd7af41c5a579a820497329c84743a53ce3"
    permissions:
      contents: read
