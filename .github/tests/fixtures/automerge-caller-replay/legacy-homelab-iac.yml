name: security-scan

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 7 * * 0"

permissions:
  contents: read

jobs:
  trivy:
    uses: FutureDevGuys/.github/.github/workflows/security-scan.yml@67fe1a5e237bc1ce75d22d1179f0f539f18f0e54
    with:
      is_dependency_bot_pr: ${{ github.event_name == 'pull_request' && (
        github.actor == 'renovate[bot]' ||
        github.actor == 'dependabot[bot]' ||
        startsWith(github.head_ref, 'renovate/') ||
        startsWith(github.head_ref, 'dependabot/')
      ) }}
    permissions:
      contents: read
